<!DOCTYPE html>
<html lang="zh-CN">
<head>
    
    <!-- PWA 图标 -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234A90E2' width='100' height='100' rx='20'/><text x='50' y='68' font-size='50' text-anchor='middle' fill='white'>🗣️</text></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Listen&amp;Speak">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4A90E2">
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listen&Speak</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #4A90E2; --bg: #F0F4F8; --card: #FFFFFF; --text: #2C3E50; --recording: #E74C3C; }
        body { font-family: 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .app-header { background: linear-gradient(135deg, var(--primary) 0%, #6BB3F0 100%); color: white; padding: 40px 20px; text-align: center; }
        .container { max-width: 600px; margin: -60px auto 20px; padding: 0 16px; }
        .card { background: var(--card); border-radius: 16px; padding: 24px; box-shadow: 0 4px 16px rgba(74, 144, 226, 0.12); }
        .screen { display: none; }
        .screen.active { display: block; }
        .grade-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
        .grade-btn { background: var(--bg); border: 2px solid #E0E6ED; border-radius: 10px; padding: 20px; cursor: pointer; text-align: center; }
        .grade-btn.selected { border-color: var(--primary); background: var(--primary); color: white; }
        .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; margin-top: 16px; }
        .btn-primary:disabled { opacity: 0.5; }
        .article-title { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 16px; }
        .article-content { font-size: 16px; line-height: 28px; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-control { flex: 1; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; }
        .btn-control.recording { background: var(--recording); }
        .record-status { text-align: center; padding: 12px; margin-bottom: 16px; border-radius: 8px; background: var(--bg); }
        .record-status.recording { background: #FFEBEE; color: var(--recording); }
        .record-status.recorded { background: #E8F5E9; color: #27AE60; }
        .playback-controls { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        .btn-small { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; }
        .back-btn { color: var(--primary); background: none; border: none; font-size: 16px; cursor: pointer; margin-bottom: 16px; }
        .navigate-row { display: flex; gap: 10px; margin-top: 16px; }
        .btn-nav { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; }
        .btn-nav.secondary { background: var(--bg); border: 2px solid #E0E6ED; }
        .btn-nav.primary { background: var(--primary); color: white; }
        .correction-area { margin-top: 20px; padding: 16px; background: #FFF8E1; border-radius: 12px; }
        .correction-score { font-size: 32px; font-weight: 700; color: #27AE60; text-align: center; }
        .word-correct { color: #27AE60; }
        .word-wrong { color: #E74C3C; text-decoration: line-through; }
        .vocab-highlight { background: linear-gradient(120deg, #FFF9C4 0%, #FFF176 100%); border-bottom: 2px solid #F9A825; border-radius: 3px; padding: 0 2px; cursor: pointer; font-weight: 600; transition: background 0.2s; }
        .vocab-highlight:hover { background: #FFE082; }
        .vocab-card { display: inline-flex; align-items: center; gap: 10px; background: white; border: 1px solid #E0E6ED; border-radius: 10px; padding: 10px 14px; margin: 4px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
        .vocab-word { font-weight: 700; color: #4A90E2; font-size: 15px; }
        .vocab-pos { font-size: 11px; color: white; background: #95A5A6; border-radius: 4px; padding: 1px 6px; margin-left: 4px; vertical-align: middle; }
        .vocab-pos.n { background: #3498DB; }
        .vocab-pos.v { background: #27AE60; }
        .vocab-pos.adj { background: #E67E22; }
        .vocab-pos.adv { background: #9B59B6; }
        .vocab-pos.phrase { background: #E74C3C; }
        .vocab-meaning { font-size: 13px; color: #555; margin-top: 2px; }
        .vocab-play-btn { flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%; background: #EBF4FF; border: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .vocab-play-btn:hover { background: #BDD9F7; }
    </style>
</head>
<body>
    <div class="app-header">
        <div style="font-size: 48px; margin-bottom: 16px;">🗣️</div>
        <h1>Listen&Speak</h1>
        <p>跟读练习 · 录音功能 · AI纠错</p>
    </div>

    <div class="container">
        <div class="card">
            <div id="screen-login" class="screen active">
                <div style="text-align:center;margin-bottom:24px;">
                    <div style="font-size:40px;margin-bottom:12px;">🗣️</div>
                    <h2 style="color:var(--primary);margin-bottom:8px;">欢迎使用 Echo</h2>
                    <p style="color:#7F8C8D;font-size:14px;">选择您的角色并登录</p>
                </div>
                
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0;">
                    <button class="grade-btn" onclick="selectRole('admin')">
                        <div style="font-size:28px;">👑</div>
                        <div style="font-weight:600;">超级管理员</div>
                    </button>
                    <button class="grade-btn" onclick="selectRole('teacher')">
                        <div style="font-size:28px;">👩‍🏫</div>
                        <div style="font-weight:600;">老师</div>
                    </button>
                    <button class="grade-btn" onclick="selectRole('student')">
                        <div style="font-size:28px;">🎓</div>
                        <div style="font-weight:600;">学生</div>
                    </button>
                </div>
                
                <div id="login-form" style="display:none;">
                    <div class="form-group">
                        <label id="login-username-label" style="display:block;font-weight:600;margin-bottom:6px;font-size:14px;">用户名</label>
                        <input type="text" id="login-username" style="width:100%;padding:12px;border:2px solid #E0E6ED;border-radius:8px;font-size:16px;" placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label style="display:block;font-weight:600;margin-bottom:6px;font-size:14px;">密码</label>
                        <input type="password" id="login-password" style="width:100%;padding:12px;border:2px solid #E0E6ED;border-radius:8px;font-size:16px;" placeholder="请输入密码">
                    </div>
                    <button class="btn-primary" onclick="doLogin()">登录</button>
                    <button class="btn-primary" id="btn-register" style="display:none;margin-top:10px;background:#27AE60;" onclick="showRegister()">注册</button>
                </div>
                
                <div style="text-align:center;margin-top:20px;font-size:12px;color:#7F8C8D;">v8.0 - 账号管理系统</div>
            </div>

            <div id="screen-home" class="screen">
                <div style="font-size: 15px; font-weight: 700; margin: 16px 0 10px;">选择年级</div>
                <div class="grade-grid">
                    <button class="grade-btn" onclick="selectGrade('primary')">
                        <div style="font-size: 28px;">🏫</div>
                        <div style="font-weight: 600;">小学</div>
                    </button>
                    <button class="grade-btn" onclick="selectGrade('middle')">
                        <div style="font-size: 28px;">🏢</div>
                        <div style="font-weight: 600;">初中</div>
                    </button>
                    <button class="grade-btn" onclick="selectGrade('high')">
                        <div style="font-size: 28px;">🎓</div>
                        <div style="font-weight: 600;">高中</div>
                    </button>
                </div>
                <button class="btn-primary" id="btn-start" onclick="startPractice()" disabled>🚀 开始跟读练习</button>
                <div style="text-align: center; font-size: 11px; color: #7F8C8D; margin-top: 20px; padding-top: 20px; border-top: 1px solid #E0E6ED;">v7.0 - 增强诊断+自动打开设置</div>
            </div>

            <div id="screen-reading-practice" class="screen">
                <button class="back-btn" onclick="goHome()">← 返回</button>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #E0E6ED;">
                    <h2 style="font-size: 18px;">📖 跟读练习</h2>
                    <span><span id="practice-current">1</span>/<span id="practice-total">20</span></span>
                </div>
                <div id="practice-grade" style="background: var(--bg); border-radius: 8px; padding: 8px; text-align: center; font-size: 12px; color: var(--primary); margin-bottom: 16px;"></div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                    <div class="article-title" id="practice-title" style="margin-bottom:0;"></div>
                    <span id="practice-completed-badge" style="display:none;font-size:12px;background:#E8F5E9;color:#27AE60;padding:4px 10px;border-radius:20px;font-weight:600;">✅ 已完成</span>
                </div>
                <div class="article-content" id="practice-content"></div>
                <div id="vocab-cards" style="display:none;margin-bottom:20px;"></div>
                <div class="controls">
                    <button class="btn-control" id="btn-play" onclick="playAudio()">🔊 听标准发音</button>
                    <button class="btn-control" id="btn-record" onclick="toggleRecording()">🎙️ 开始录音</button>
                </div>
                <div class="record-status" id="record-status" style="display:none;">点击录音按钮开始录音</div>
                <div id="playback-area" style="display:none;">
                    <div class="playback-controls">
                        <button class="btn-small" style="background: var(--primary); color: white;" onclick="playRecording()">▶️ 播放</button>
                        <button class="btn-small" style="background: #FF9800; color: white;" onclick="startCorrection()">✅ 纠错</button>
                        <button class="btn-small" style="background: #E74C3C; color: white;" onclick="deleteRecording()">🗑️ 删除</button>
                    </div>
                </div>
                <div id="correction-area" style="display:none;"></div>
                <div class="navigate-row">
                    <button class="btn-nav secondary" onclick="prevArticle()" id="practice-prev">⬅️ 上一篇</button>
                    <button class="btn-nav primary" onclick="nextArticle()" id="practice-next">下一篇 ➡️</button>
                </div>
            </div>

            <!-- 管理员/老师仪表盘 -->
            <div id="screen-admin" class="screen">
                <div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:#E8F4FD;border-radius:10px;margin-bottom:16px;">
                    <div>
                        <div style="font-weight:600;" id="admin-name">超级管理员</div>
                        <div style="font-size:12px;color:#7F8C8D;" id="admin-role-label">管理员账号</div>
                    </div>
                    <button onclick="logout()" style="padding:8px 16px;background:#FFEBEE;color:#E74C3C;border:none;border-radius:6px;cursor:pointer;">退出</button>
                </div>
                
                <div style="display:flex;gap:8px;margin-bottom:20px;">
                    <button class="admin-tab active" onclick="showAdminTab('teachers')" id="tab-teachers" style="flex:1;padding:10px;text-align:center;background:var(--primary);color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;">老师管理</button>
                    <button class="admin-tab" onclick="showAdminTab('students')" id="tab-students" style="flex:1;padding:10px;text-align:center;background:var(--bg);border:none;border-radius:8px;cursor:pointer;font-size:14px;">学生管理</button>
                    <button class="admin-tab" onclick="showAdminTab('progress')" id="tab-progress" style="flex:1;padding:10px;text-align:center;background:var(--bg);border:none;border-radius:8px;cursor:pointer;font-size:14px;">📊 进度查看</button>
                </div>
                
                <div id="admin-teachers">
                    <button class="btn-primary" onclick="showAddUserModal('teacher')">+ 添加老师</button>
                    <div id="teacher-list" style="max-height:300px;overflow-y:auto;margin-top:12px;"></div>
                </div>
                
                <div id="admin-students" style="display:none;">
                    <button class="btn-primary" onclick="showAddUserModal('student')">+ 添加学生</button>
                    <div id="student-list" style="max-height:300px;overflow-y:auto;margin-top:12px;"></div>
                </div>

                <!-- 进度查看面板 -->
                <div id="admin-progress" style="display:none;">
                    <div style="margin-bottom:16px;">
                        <select id="progress-student-filter" onchange="renderProgressPanel()" style="width:100%;padding:10px;border:2px solid #E0E6ED;border-radius:8px;font-size:14px;">
                            <option value="all">全部学生</option>
                        </select>
                    </div>
                    <div id="progress-content" style="max-height:500px;overflow-y:auto;"></div>
                </div>
                
                <!-- 管理员专属：重置数据按钮 -->
                <div id="admin-reset-section" style="margin-top:24px;padding-top:20px;border-top:2px dashed #E0E6ED;">
                    <button onclick="resetAllData()" style="width:100%;padding:12px;background:#FFEBEE;color:#E74C3C;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;">🔄 重置所有数据</button>
                    <p style="font-size:11px;color:#999;margin-top:8px;text-align:center;">⚠️ 此操作将清除所有账号和练习记录</p>
                </div>
            </div>

            <!-- 学生首页 -->
            <div id="screen-student-home" class="screen">
                <div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:#E8F4FD;border-radius:10px;margin-bottom:16px;">
                    <div>
                        <div style="font-weight:600;" id="student-name">学生</div>
                        <div style="font-size:12px;color:#7F8C8D;" id="student-grade-display">年级</div>
                    </div>
                    <button onclick="logout()" style="padding:8px 16px;background:#FFEBEE;color:#E74C3C;border:none;border-radius:6px;cursor:pointer;">退出</button>
                </div>
                
                <div style="font-size:15px;font-weight:700;margin:16px 0 10px;">我的练习进度</div>
                <div id="student-progress-summary" style="margin-bottom:16px;"></div>
                
                <div style="font-size:15px;font-weight:700;margin:16px 0 10px;">选择年级开始练习</div>
                <div class="grade-grid" id="student-grade-grid"></div>
                
                <button class="btn-primary" id="btn-start-practice" onclick="startPracticeStudent()" disabled>🚀 开始跟读练习</button>
            </div>
        </div>
    </div>
    
    <!-- 添加用户弹窗 -->
    <div id="add-user-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:999;">
        <div style="background:white;padding:24px;border-radius:16px;max-width:90%;width:340px;">
            <div style="font-size:18px;font-weight:700;margin-bottom:16px;" id="modal-title">添加用户</div>
            <div class="form-group">
                <label style="display:block;font-weight:600;margin-bottom:6px;font-size:14px;">用户名</label>
                <input type="text" id="new-username" style="width:100%;padding:12px;border:2px solid #E0E6ED;border-radius:8px;font-size:16px;" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label style="display:block;font-weight:600;margin-bottom:6px;font-size:14px;">密码</label>
                <input type="password" id="new-password" style="width:100%;padding:12px;border:2px solid #E0E6ED;border-radius:8px;font-size:16px;" placeholder="请输入密码">
            </div>
            <div class="form-group">
                <label style="display:block;font-weight:600;margin-bottom:6px;font-size:14px;">姓名</label>
                <input type="text" id="new-name" style="width:100%;padding:12px;border:2px solid #E0E6ED;border-radius:8px;font-size:16px;" placeholder="请输入姓名">
            </div>
            <div class="form-group" id="grade-select-group" style="display:none;">
                <label style="display:block;font-weight:600;margin-bottom:6px;font-size:14px;">年级</label>
                <select id="new-grade" style="width:100%;padding:12px;border:2px solid #E0E6ED;border-radius:8px;font-size:16px;">
                    <option value="primary">小学</option>
                    <option value="middle">初中</option>
                    <option value="high">高中</option>
                </select>
            </div>
            <div style="display:flex;gap:10px;margin-top:16px;">
                <button onclick="closeModal()" style="flex:1;padding:10px;background:#95A5A6;color:white;border:none;border-radius:8px;cursor:pointer;">取消</button>
                <button onclick="addUser()" style="flex:1;padding:10px;background:var(--primary);color:white;border:none;border-radius:8px;cursor:pointer;">确定</button>
            </div>
        </div>
    </div>

    <script>
        const PRIMARY_ARTICLES = [
            { title: 'My Dog', text: 'I have a dog. His name is Spot. He is big and brown. He likes to run and play. I feed him every day. He eats rice and meat. Spot sleeps in a small house in the yard. He barks when someone comes to the door. I love my dog very much.' },
            { title: 'My Family', text: 'I have a small family. There are four people in my family. They are my dad, my mom, my sister, and me. My dad goes to work every day. My mom cooks food for us. My sister and I go to school. We are a happy family.' },
            { title: 'My School', text: 'I go to school every day. My school is not far from my home. I walk to school with my friend. We have six classes every day. I like math and art. My teacher is very kind. I have many friends at school. I like my school very much.' },
            { title: 'My Room', text: 'This is my room. It is small but clean. I have a bed, a desk, and a chair. My books are on the shelf. I do my homework at my desk every night. My mom helps me keep my room tidy. I like my room because it is my own space.' },
            { title: 'I Like Fruit', text: 'I like fruit very much. I eat fruit every day. I like apples, bananas, and oranges. Apples are red and sweet. Bananas are yellow and soft. Oranges are round and full of juice. My mom says fruit is good for my health. I always eat fruit after lunch.' },
            { title: 'The Weather', text: 'Today is a sunny day. The sky is blue and clear. There are no clouds. It is warm outside. I can play in the park. Sometimes it rains. On rainy days, I stay at home and read books. I like sunny days the best because I can go outside and play.' },
            { title: 'My Morning', text: 'I wake up at seven every morning. First, I wash my face and brush my teeth. Then I eat breakfast with my family. We have bread, eggs, and milk. After breakfast, I put on my school bag and go to school. I am never late for school.' },
            { title: 'Colors', text: 'I love colors. Red is the color of apples and roses. Yellow is the color of the sun and bananas. Blue is the color of the sky and the sea. Green is the color of grass and trees. My favorite color is blue. What is your favorite color?' },
            { title: 'My Toys', text: 'I have many toys in my room. I have a toy car, a ball, and some building blocks. My favorite toy is my red toy car. I play with it every day after school. My little sister likes the building blocks. We play together and have a lot of fun.' },
            { title: 'Animals I Like', text: 'I like animals very much. I like dogs, cats, and rabbits. Dogs are friendly and playful. Cats are quiet and soft. Rabbits have long ears and short tails. My friend has a rabbit at home. I want to have a pet rabbit one day. Animals are our good friends.' },
            { title: 'My Lunch', text: 'I eat lunch at school every day. Today I have rice, vegetables, and chicken. The food is warm and tasty. I sit with my friends at the lunch table. We talk and laugh while we eat. After lunch, we go outside to play for a short time. I like lunchtime at school.' },
            { title: 'A Walk in the Park', text: 'On Sunday, I went to the park with my mom. The park is big and green. There are many trees and flowers. We walked on the path and saw some birds. The birds were singing in the trees. I fed some ducks by the pond. It was a fun and happy afternoon.' },
            { title: 'My Favorite Food', text: 'My favorite food is noodles. My mom makes the best noodles. She puts vegetables, eggs, and meat in the soup. The noodles are soft and the soup is warm. I eat noodles for lunch on weekends. My dad likes noodles too. We always eat together as a family.' },
            { title: 'Going to the Store', text: 'Yesterday I went to the store with my dad. We needed to buy some food. We got milk, bread, apples, and eggs. The store was big and bright. I helped my dad carry the bag. On the way home, my dad bought me a small ice cream. It was a good day.' },
            { title: 'My Classmates', text: 'I have many classmates at school. My best friend is Li Ming. He is funny and kind. We sit next to each other in class. We help each other with homework. At break time, we play games together. I also have a friend named Mei. She is good at drawing. I like all my classmates.' },
            { title: 'Bedtime', text: 'Every night, I get ready for bed at nine o\'clock. I brush my teeth and wash my face. Then I put on my pajamas. My mom reads me a short story before I sleep. I like stories about animals and adventures. After the story, I say good night to my mom and dad. Then I close my eyes and sleep.' },
            { title: 'My Pencil Case', text: 'I have a blue pencil case. Inside, I have pencils, a ruler, an eraser, and some colored pens. I use my pencils to write and draw. I use the ruler to draw straight lines. My eraser helps me fix mistakes. I keep my pencil case clean and tidy. It is very useful for school.' },
            { title: 'Seasons', text: 'There are four seasons in a year. They are spring, summer, autumn, and winter. In spring, flowers bloom and birds sing. In summer, it is hot and we can swim. In autumn, the leaves turn red and yellow. In winter, it is cold and sometimes it snows. I like all four seasons.' },
            { title: 'My Weekend', text: 'I like weekends very much. On Saturday, I do my homework in the morning. In the afternoon, I play outside with my friends. On Sunday, my family goes out together. Sometimes we go to the park or the mall. In the evening, we watch TV together. Weekends are my favorite time of the week.' },
            { title: 'I Can Help', text: 'I like to help my family at home. I can make my bed every morning. I can water the plants in the garden. I can wash the dishes after dinner. My mom says I am a good helper. Helping at home makes me feel happy and proud. I want to help more every day.' }
        ];

        const MIDDLE_ARTICLES = [
            { title: 'My Cat', text: 'I have a lovely pet cat named Fluffy. She has beautiful white fur that feels incredibly soft when I touch it. Every morning, Fluffy waits by her bowl for fresh milk, and she makes a happy purring sound when I pet her gently. She loves to find sunny spots in our living room where she can nap peacefully for hours. Sometimes she chases her own tail or plays with small balls of yarn. My cat brings so much joy to our family with her cute antics and sweet personality.' },
            { title: 'My Bedroom', text: 'This is my cozy bedroom where I spend most of my free time. It is not very large, but I have decorated it nicely with my favorite things. My comfortable red bed sits against the wall, covered with soft blankets and fluffy pillows. Near the window, there is a wooden desk where I do my homework every evening. I keep all my storybooks organized on a tall shelf in the corner. A big yellow lamp on my desk provides warm light for reading before bedtime. I truly love my personal space very much.' },
            { title: 'A Nice Day', text: 'Today has been such a wonderful and pleasant day from start to finish. When I woke up this morning, I saw that the sky was a brilliant blue without any clouds. The bright sun shone warmly through my window, making everything look cheerful and inviting. After breakfast, my mother and I decided to visit the nearby park together. We walked along the winding paths and saw many colorful birds singing in the trees. The green leaves rustled gently in the soft breeze. It was truly a happy and memorable day.' },
            { title: 'My Teacher', text: 'My English teacher is Mrs. Green, and she is absolutely wonderful in every way. She always greets us with a warm smile and treats everyone with kindness and respect. Her smart and creative teaching methods make every lesson interesting and engaging. Every afternoon, she reads us fascinating stories from different countries around the world. Her classroom is always filled with laughter and excitement. I have learned so much from her, and I feel very lucky to have such an amazing teacher.' },
            { title: 'A Happy Family', text: 'I am blessed to have such a loving and happy family. My father is tall and strong, and he always makes us laugh with his funny jokes. My mother is beautiful both inside and out, and she cooks the most delicious meals for us. I also have a little brother who looks up to me and follows me everywhere. We enjoy playing board games together in the living room every weekend. Our home is always filled with love, laughter, and warm memories that I will treasure forever.' },
            { title: 'At the Zoo', text: 'Last Sunday was an exciting day because my whole family visited the city zoo together. We arrived early in the morning when the animals were most active and playful. The enormous elephants impressed us with their size and gentle movements. The clever monkeys swung from branch to branch, making funny faces at the visitors. We watched the adorable pandas munching on fresh bamboo stalks with great enjoyment. I took many photographs to remember this special family outing.' },
            { title: 'My School Bag', text: 'My blue school bag is one of my most important possessions for school. It has multiple pockets and compartments that help me stay organized throughout the day. I carefully place all my textbooks and notebooks in the main section. My pencil case filled with colorful pens and pencils goes in the front pocket for easy access. On the side, there is a special holder for my water bottle. This bag has been with me for two years and still looks great.' },
            { title: 'Fruits I Like', text: 'Eating fresh fruits is one of my favorite healthy habits every single day. My absolute favorite fruit is the crisp red apple that grows in our local orchards. Apples are not only sweet and juicy but also packed with important vitamins. I also enjoy ripe yellow bananas that give me energy for sports activities. Fresh oranges are another favorite because they are refreshing and full of vitamin C. Doctors always say that fruits are essential for growing children.' },
            { title: 'My Best Friend', text: 'Tom has been my best friend since we first met in kindergarten many years ago. We are fortunate to be in the same class where we can help each other with schoolwork. During lunch breaks, we always sit together and share stories about our families and hobbies. After school ends, we often play soccer on the field near our neighborhood. Tom has a wonderful sense of humor and a kind heart that makes everyone like him. I feel truly grateful to have such a loyal and caring friend.' },
            { title: 'A Rainy Day', text: 'Rainy days have a special charm that makes me feel peaceful and relaxed inside. When the rain starts falling, I enjoy staying indoors with a warm blanket and good books. My mother usually prepares hot vegetable soup that tastes perfect on cold wet days. Sometimes we bake cookies together while listening to the raindrops on our roof. The gentle sound of rainfall helps me focus when I am reading or drawing. I find rainy days surprisingly comforting and enjoyable.' },
            { title: 'My Hobbies', text: 'Having various hobbies makes my life more colorful and interesting every day. I absolutely love drawing pictures of animals and nature scenes with my colored pencils. Riding my bicycle around the neighborhood gives me a sense of freedom and adventure. On weekends, I often play fetch with my energetic dog in the backyard. Among all my hobbies, drawing remains my absolute favorite creative activity. When I grow up, I dream of becoming a professional artist.' },
            { title: 'A Trip to the Beach', text: 'Our family vacation to the beach last summer created memories I will never forget. The sand felt incredibly soft and white between my toes as I walked along the shore. The ocean water was cool and blue, inviting us to splash and swim for hours. I spent the afternoon building an enormous sandcastle with towers and a moat. My parents bought us delicious ice cream from a nearby shop. Everyone agreed it was the most fun day of our entire summer vacation.' },
            { title: 'My Mom', text: 'My mother is truly the most wonderful person in my entire life. She wakes up early every morning to prepare nutritious and delicious breakfast for our family. At bedtime, she reads me enchanting stories that transport me to magical worlds. Her sweet singing voice comforts me whenever I feel sad or worried about something. She gives the best hugs that make all my problems disappear instantly. I love my mom more than words can ever express.' },
            { title: 'A Snowy Day', text: 'Waking up to find everything covered in snow feels like entering a winter wonderland. The entire world looks clean and white, transforming ordinary streets into beautiful landscapes. I quickly put on my warmest coat, gloves, and boots before running outside. My friends and I work together to build a snowman with a carrot nose and button eyes. Later, we have exciting snowball fights until our fingers get cold. Playing in the snow brings pure joy to my heart.' },
            { title: 'At the Supermarket', text: 'Grocery shopping with my father has become our special weekend tradition together. We make a list of items we need, including fresh milk and whole grain bread for the week. I enjoy selecting the ripest apples and juiciest oranges from the produce section. The supermarket is always clean, bright, and organized with wide aisles. My dad teaches me how to compare prices and choose quality products. These shopping trips are precious bonding time with my dad.' },
            { title: 'My Grandpa', text: 'My grandfather lives on a peaceful farm in the beautiful countryside far from the city. His property includes vast fields where he grows organic vegetables and sweet fruits. Grandpa loves sharing fascinating stories about his childhood and historical events. Every summer vacation, I visit him to help with farm work and learn new skills. He patiently teaches me how to plant seeds and care for animals. My grandpa holds a very special place in my heart.' },
            { title: 'A Birthday Party', text: 'Yesterday marked my tenth birthday, and my parents organized an amazing celebration at home. They decorated the living room with colorful balloons and a big banner with my name. All my closest friends arrived with thoughtful gifts and big smiles on their faces. We played entertaining games like musical chairs and pin the tail on the donkey. The chocolate cake was absolutely delicious with creamy frosting. It was undoubtedly the most wonderful birthday celebration ever.' },
            { title: 'My Favorite Color', text: 'Blue has always been my favorite color for as many reasons as the sky has clouds. Looking up at the clear blue sky fills me with hope and endless possibilities. The deep blue ocean represents mystery and adventure in distant lands. Most of my clothes are various shades of blue, from navy to sky blue. Even my bedroom walls are painted a calming light blue. This beautiful color brings me peace and happiness every day.' },
            { title: 'Learning English', text: 'Studying English at school has opened up an entirely new world for me. The language is both challenging and fun, with interesting grammar rules and vocabulary. I can now confidently greet people and introduce myself in English. Counting numbers and telling time has become second nature to me. I especially enjoy singing popular English songs with my classmates. Learning this global language will help me connect with people worldwide.' },
            { title: 'A Day in My Life', text: 'My typical day follows a routine that keeps me productive and happy. I wake up at seven oclock when my alarm clock rings loudly. After washing up, I join my family for a nutritious breakfast together. School hours are filled with interesting lessons and fun activities with friends. Once home, I complete my homework before dinner time. The evening is reserved for relaxation and preparing for the next day.' },
            { title: 'The Power of Reading', text: 'Reading is a magical activity that opens doors to countless new worlds and possibilities. When we immerse ourselves in a good book, our minds expand and our imagination soars to new heights. Through the pages of books, we can travel to distant countries and experience different cultures without ever leaving our comfortable homes. A truly great book has the power to change our perspective and transform the way we think about life. Reading inspires us to dream bigger and work harder to achieve our goals.' },
            { title: 'The Importance of Friendship', text: 'True friendship represents one of the most valuable treasures that life has to offer us. A genuine friend remains by your side during difficult times and celebrates with you during happy moments. They willingly share both your joys and your sorrows without expecting anything in return. Meaningful friendships teach us crucial lessons about trust, loyalty, and mutual respect. These relationships help us grow into better, more compassionate human beings.' },
            { title: 'My Dream Career', text: 'Since childhood, I have dreamed of becoming a skilled doctor who helps sick people recover their health. The medical profession requires years of dedicated study and practical training. However, the immense reward of saving lives and reducing suffering makes all the hard work worthwhile. I have been focusing intensely on science subjects like biology and chemistry. With determination and persistence, I believe my dream will eventually come true.' },
            { title: 'Protecting Our Environment', text: 'Our beautiful planet is currently facing numerous serious environmental challenges that threaten all living things. Industrial pollution continues to destroy the quality of our air and water resources. Climate change is causing extreme weather patterns and affecting wildlife populations worldwide. We must take immediate action to reduce our carbon footprint and protect nature. Simple daily steps like recycling materials and reducing waste can make a significant difference.' },
            { title: 'The Value of Hard Work', text: 'Achieving meaningful success in life never happens without consistent effort and dedication. Hard work serves as the fundamental key to reaching our most ambitious goals and aspirations. When we inevitably face challenges and obstacles, we should never give up or lose hope. Every failure provides a valuable lesson that brings us closer to eventual success. Through experience, I have learned that persistence matters more than natural talent.' },
            { title: 'The Influence of Technology', text: 'Modern technology has completely transformed the way we live our daily lives in remarkable ways. Smartphones and computers connect us instantly with friends and family across the entire globe. The internet provides access to endless information and educational resources at our fingertips. However, we must recognize that technology also has potential downsides and risks. Excessive screen time can negatively impact our physical health and mental well-being.' },
            { title: 'My Favorite Holiday', text: 'The Spring Festival stands out as my absolute favorite holiday throughout the entire year. As the most important traditional celebration in Chinese culture, it brings families together from near and far. Relatives gather for elaborate reunion dinners featuring delicious traditional dishes. Children receive red envelopes containing money and wear beautiful new clothes. Spectacular fireworks illuminate the night sky with brilliant colors.' },
            { title: 'Learning a New Language', text: 'The process of learning a new language presents both significant challenges and rewarding achievements. Mastering a foreign language opens doors to understanding different cultures and customs. When we can speak another language fluently, we communicate effectively with millions more people worldwide. Regular practice and immersion are absolutely essential for developing true language proficiency. The journey requires patience but brings lifelong benefits.' },
            { title: 'The Beauty of Nature', text: 'Nature serves as the most talented and generous artist in the entire universe. Majestic mountains stand tall with timeless grace and dignity against the sky. Rivers flow continuously with gentle music that soothes the human soul. Flowers bloom in countless colors and varieties throughout the changing seasons. Magnificent sunsets paint the evening sky with breathtaking shades of gold and pink.' },
            { title: 'My School Life', text: 'My school life is filled with memorable experiences that I will cherish forever. Each day brings opportunities to learn something new and exciting from knowledgeable teachers. My instructors guide me with patience and encourage me to ask questions. My classmates have gradually become close friends who support one another. We collaborate on challenging projects and enjoy recreational activities together.' },
            { title: 'The Courage to Try', text: 'Many individuals allow fear of failure to prevent them from attempting new experiences. They avoid trying unfamiliar activities because they worry about making mistakes or looking foolish. However, failure represents a natural and necessary part of the learning process. Every expert in any field was once a complete beginner who made numerous errors. We must find the courage to try new things despite our fears.' },
            { title: 'Healthy Eating Habits', text: 'Maintaining good nutrition is absolutely essential for supporting our overall health and vitality. We should consciously choose to eat more fresh vegetables and fruits every single day. Processed junk food might taste delicious temporarily, but it causes serious harm to our bodies over time. Drinking sufficient water throughout the day keeps our systems functioning properly. Developing healthy eating habits early in life sets the foundation for future wellness.' },
            { title: 'The Role of Music', text: 'Music functions as a universal language that transcends cultural and linguistic barriers between people. It possesses the unique ability to express complex emotions that ordinary words cannot adequately convey. Uplifting music makes us feel joyful and energized during difficult periods. Melancholy music helps us process and release painful feelings in healthy ways. Learning to play a musical instrument develops discipline and patience.' },
            { title: 'My Hometown', text: 'My hometown is a small but exceptionally beautiful place nestled in a peaceful valley. The air remains fresh and clean thanks to the surrounding forests and minimal industrial activity. The local residents are genuinely friendly and warmly welcoming to visitors and newcomers. I spent my entire childhood playing happily by the clear river that runs through town. Every street corner and building holds special memories from my youth.' },
            { title: 'The Importance of Teamwork', text: 'The saying that teamwork makes the dream work contains profound truth about human collaboration. Working together effectively achieves far more than individual effort alone could accomplish. Each team member contributes unique strengths, skills, and perspectives to the group. Open communication serves as the essential key to successful collaboration on any project. Through teamwork experiences, we learn to appreciate and respect others.' },
            { title: 'Sports and Health', text: 'Engaging in regular physical exercise keeps our bodies healthy and our minds sharp. Sports activities improve both our physical condition and our mental well-being simultaneously. Playing team sports like basketball develops cooperation and communication abilities. Swimming provides excellent full-body exercise that strengthens all major muscle groups. Making sports a consistent part of our daily routine leads to lasting health benefits.' },
            { title: 'The Magic of Books', text: 'Books serve as magical portals that transport readers to fascinating other worlds and realities. They take us on incredible adventures far beyond the limits of our ordinary imagination. Fictional stories entertain us while also inspiring creativity and original thinking. Non-fiction books educate readers and provide valuable information about countless topics. A single powerful book can completely change our perspective on life.' },
            { title: 'Dealing with Stress', text: 'Experiencing stress has become an increasingly common problem in our fast-paced modern society. Excessive stress negatively affects both our physical health and our emotional happiness over time. We need to discover healthy and constructive ways to cope with daily pressures. Physical exercise, creative hobbies, and meaningful conversations with friends provide effective relief. Getting adequate sleep each night is also essential for stress management.' },
            { title: 'The Future of Education', text: 'Education is rapidly evolving and transforming through the integration of advanced technology tools. Online learning platforms now provide students access to knowledge from anywhere in the world. Virtual classrooms connect learners with expert teachers regardless of geographical distance. Artificial intelligence tutors offer increasingly personalized learning experiences tailored to individual needs. These innovations promise to make quality education more accessible globally.' },
            { title: 'What Makes a Good Leader', text: 'Effective leaders possess the ability to inspire and motivate others toward achieving common goals. They communicate their vision clearly while also listening carefully to team members input. True leaders accept responsibility for both successes and failures of their decisions. They maintain calm composure even when facing intense pressure and unexpected challenges. Most importantly, excellent leaders trust their team members and empower them to grow.' }

        const HIGH_ARTICLES = [
            { title: 'The Paradox of Choice', text: 'In contemporary society, we are confronted with an unprecedented abundance of choices in nearly every aspect of our daily lives. From selecting career paths to purchasing consumer goods, the available options often seem virtually limitless and overwhelming. Yet paradoxically, this proliferation of choices frequently leads to decision paralysis and deep dissatisfaction rather than happiness. Psychological research suggests that having too many options can actually reduce our overall satisfaction with whatever we ultimately choose.' },
            { title: 'The Intersection of Art and Science', text: 'Throughout human history, art and science have traditionally been perceived as fundamentally distinct and separate intellectual domains. However, increasingly we recognize that these seemingly disparate fields actually share profound commonalities and interconnected relationships. Both artistic creation and scientific discovery are fundamentally driven by human curiosity and the deep desire to understand reality. The most innovative breakthroughs often occur precisely at the boundaries where these disciplines meet and influence each other.' },
            { title: 'The Ethics of Artificial Intelligence', text: 'As artificial intelligence systems become increasingly sophisticated and autonomous, humanity faces unprecedented ethical challenges that demand careful consideration. AI algorithms now make consequential decisions affecting millions of human lives in areas like healthcare and criminal justice. Yet these complex systems often operate as opaque black boxes whose decision-making processes remain mysterious even to their creators. When AI systems inevitably err, determining who bears moral and legal responsibility becomes profoundly difficult.' },
            { title: 'The Philosophy of Impermanence', text: 'The concept of impermanence, central to Buddhist philosophical traditions, offers profound insights into the fundamental nature of the human condition. Everything in existence, from physical matter to emotional states, remains subject to constant change and transformation. Yet humans instinctively resist this fundamental reality, clinging desperately to stability and permanence. Understanding and accepting impermanence can paradoxically lead to greater peace and reduced suffering.' },
            { title: 'The Evolution of Human Consciousness', text: 'Human consciousness remains one of the greatest unsolved mysteries in all of scientific inquiry. How exactly does subjective experience arise from objective physical processes in the brain? This hard problem of consciousness has perplexed philosophers and neuroscientists alike for centuries. Recent advances in brain imaging and artificial intelligence have renewed interest in understanding the neural correlates of conscious experience.' },
            { title: 'The Global Village', text: 'Globalization has fundamentally transformed our world into an interconnected village where events in one region instantly affect distant populations. Information now travels instantaneously across continents through digital networks and social media platforms. Cultural exchange has never been more vibrant or accessible to ordinary people worldwide. Yet this unprecedented interconnectedness also brings significant challenges including pandemics and economic instability.' },
            { title: 'The Psychology of Happiness', text: 'Happiness has been studied extensively by psychologists and neuroscientists seeking to understand what truly brings human flourishing. Research consistently reveals that material wealth contributes far less to lasting happiness than commonly believed by most people. Strong social connections and meaningful relationships prove far more important for subjective well-being. Factors like gratitude, purpose, and community belonging often outweigh income in predicting happiness.' },
            { title: 'The Climate Crisis', text: 'Climate change represents the defining existential challenge of our generation with consequences that will shape human civilization for centuries. Rising global temperatures threaten ecosystems worldwide and endanger countless species with extinction. Extreme weather events including hurricanes and droughts become increasingly frequent and devastating. Yet addressing this crisis effectively requires unprecedented levels of global cooperation and political will.' },
            { title: 'The Art of Critical Thinking', text: 'Critical thinking stands as perhaps the most valuable intellectual skill in our current information age characterized by data overload. We are constantly bombarded with information through various media channels, much of it deliberately misleading or demonstrably false. The ability to analyze arguments logically and evaluate evidence objectively has become absolutely crucial for informed citizenship. Educational systems must prioritize teaching these skills from an early age.' },
            { title: 'The Future of Work', text: 'Automation and artificial intelligence technologies are rapidly reshaping the fundamental nature of work across all industries and sectors. Many traditional jobs that employed millions will inevitably disappear within coming decades. Meanwhile entirely new professions that we cannot yet imagine will emerge to replace them. Adaptability and commitment to lifelong learning become essential survival skills for navigating this transition.' },
            { title: 'The Power of Silence', text: 'In our hyperconnected modern world filled with constant digital notifications, silence has become an increasingly rare and precious commodity. Yet silence holds profound psychological and spiritual benefits that many have forgotten how to appreciate. Quiet moments allow for deep reflection and creative thinking unencumbered by external stimulation. History shows that many great ideas and breakthroughs emerged from periods of quiet contemplation.' },
            { title: 'The Philosophy of Education', text: 'What exactly constitutes the true fundamental purpose of education in a rapidly changing society? Is the primary goal to prepare students for specific careers and economic productivity? Or should education focus on developing well-rounded human beings capable of critical thought and ethical reasoning? The most profound educators throughout history have viewed education as the holistic cultivation of the whole person.' },
            { title: 'The Science of Sleep', text: 'Sleep represents far more than merely the absence of wakefulness or conscious awareness. It constitutes an active biological process absolutely essential for maintaining both physical health and mental functioning. During various stages of sleep, our brains actively consolidate memories and repair damaged tissues throughout the body. Chronic sleep deprivation has been linked to numerous serious health conditions including obesity and depression.' },
            { title: 'The Ethics of Climate Change', text: 'Climate change raises profound ethical questions about justice and responsibility across generations and national boundaries. Those who contributed least to historical greenhouse gas emissions often suffer disproportionately from climate impacts. Future generations who had no role in creating this crisis will bear severe consequences of present actions and inaction. These ethical dimensions complicate international negotiations and policy responses.' },
            { title: 'The Art of Living Alone', text: 'Solitude remains widely misunderstood and feared in contemporary society obsessed with social connection. Many people dread being alone, immediately equating solitude with loneliness and social failure. Yet chosen solitude can be profoundly creative, restorative, and necessary for psychological health. History demonstrates that great thinkers and artists have often sought extended periods of isolation.' },
            { title: 'The Digital Dilemma', text: 'Digital technology presents humanity with a profound and complex dilemma without easy solutions. These tools connect us globally while simultaneously isolating us physically from immediate communities. Social media platforms offer unprecedented connection but often breed unhealthy social comparison and anxiety. Information has become abundant and freely available while human attention remains scarce and fragmented.' },
            { title: 'The Economics of Inequality', text: 'Economic inequality has reached historically unprecedented levels in many countries around the world. The gap between rich and poor continues widening at an accelerating pace with troubling social implications. This growing disparity affects access to healthcare, quality education, and political power. Economists debate whether such inequality ultimately benefits or harms overall economic growth.' },
            { title: 'The Spirit of Adventure', text: 'The human spirit of adventure has fundamentally driven progress throughout our species history. From exploring distant unknown lands to pioneering scientific frontiers, this innate curiosity has shaped civilization. The greatest rewards in life often come to those willing to venture beyond their comfort zones. Risk-taking and exploration expand both individual horizons and collective human knowledge.' },
            { title: 'The Meaning of Success', text: 'Success is commonly measured by external markers like accumulated wealth and social status. Yet many individuals achieve these conventional markers while feeling profoundly unfulfilled and empty inside. True success encompasses far more than material accomplishments and public recognition. Meaningful relationships, continuous personal growth, and contributing positively to others lives matter more deeply.' },
            { title: 'The Legacy We Leave', text: 'Each generation inherits both benefits and burdens from those who came before while shaping conditions for those who follow. What kind of legacy will our particular generation ultimately leave for future inhabitants of this planet? Will we be remembered primarily for technological innovation or for environmental exploitation? The choices we collectively make today will echo through time affecting countless lives.' }

        // 实际用 Supabase 存储，密码用简单 hash 保护
        async function hashPassword(password) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(password));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
        }

                    'Content-Type': 'application/json',
                    'Prefer': options.prefer || '',
                    ...(options.headers || {})
                }
            });
            if (!res.ok) {
                const err = await res.text();
                throw new Error(err);
            }
            const text = await res.text();
            return text ? JSON.parse(text) : null;
        }

        async function checkMicPermission() {
            try {
                // 检查浏览器是否支持 Web Speech API
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    console.warn('浏览器不支持语音识别');

                if (audioInputs.length === 0) {
                    showMicPermissionDialog('no-device');

                // 尝试获取麦克风权限

                stream.getTracks().forEach(t => t.stop());
                console.log('麦克风权限正常');
                return true;
            } catch (err) {
                console.error('麦克风权限错误:', err.name, err.message);
                
                // 根据错误类型显示不同的对话框
                let errorType = 'denied';
                if (err.name === 'NotFoundError') errorType = 'no-device';
                else if (err.name === 'NotReadableError') errorType = 'in-use';
                else if (err.name === 'PermissionDismissedError') errorType = 'dismissed';
                
                showMicPermissionDialog(errorType);
                return false;
            }

            u.rate = 0.75;
            u.pitch = 1.0;
            u.voice = getBestVoice('en');
            window.speechSynthesis.speak(u);
        }

        // 选取最佳英语人声（优先自然人声）
        function getBestVoice(lang) {
            const voices = window.speechSynthesis.getVoices();
            // 优先级：Samantha(macOS) > Daniel(英式) > Karen > Moira > 其他en-US/en-GB
            const preferred = ['Samantha', 'Daniel', 'Karen', 'Moira', 'Tessa', 'Fiona', 'Rishi'];
            for (const name of preferred) {
                const v = voices.find(v => v.name.includes(name));
                if (v) return v;
            }
            // 回退：任意 en-US 或 en-GB
            return voices.find(v => v.lang === 'en-US') ||
                   voices.find(v => v.lang === 'en-GB') ||
                   voices.find(v => v.lang.startsWith('en')) || null;
        }

        // 文本预处理：加入意群停顿 + 连读友好断句
        function prepareTextForSpeech(text) {
            return text
                // 句末停顿加长（用逗号+空格模拟）
                .replace(/\. /g, '.  ')
                .replace(/\? /g, '?  ')
                .replace(/! /g, '!  ')
                // 逗号后短停顿
                .replace(/, /g, ',  ')
                // 常见意群短语前加轻停顿（介词短语、连词）
                .replace(/ (because|although|however|therefore|moreover|furthermore|in addition|as a result|for example|such as|in order to|as well as|not only|but also|on the other hand|in fact|of course|at the same time|in the end|after all) /gi,
                    '  $1 ')
                // 长句中的关系从句前停顿
                .replace(/ (which|who|that|where|when|while) /g, '  $1 ');
        }

        function playAudio() {
            const btn = document.getElementById('btn-play');
            if (state.isPlaying) {
                window.speechSynthesis.cancel();
                btn.textContent = '🔊 听标准发音';
                state.isPlaying = false;
                return;
            }
            const articles = READING_PRACTICE[state.grade] || [];
            const article = articles[state.index];

            // 等待 voices 加载完成再播放
            const doSpeak = () => {
                const processedText = prepareTextForSpeech(article.text);
                const utterance = new SpeechSynthesisUtterance(processedText);
                utterance.lang = 'en-US';
                utterance.rate = 0.78;   // 慢速，清晰
                utterance.pitch = 1.05;  // 略高，更自然有感情
                utterance.volume = 1.0;
                const bestVoice = getBestVoice('en');
                if (bestVoice) utterance.voice = bestVoice;
                utterance.onstart = () => { state.isPlaying = true; btn.textContent = '⏸️ 停止'; };
                utterance.onend = () => { state.isPlaying = false; btn.textContent = '🔊 听标准发音'; };
                utterance.onerror = () => { state.isPlaying = false; btn.textContent = '🔊 听标准发音'; };
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            };

            // voices 可能异步加载
            if (window.speechSynthesis.getVoices().length > 0) {
                doSpeak();
            } else {
                window.speechSynthesis.onvoiceschanged = () => { doSpeak(); };
                // 超时兜底
                setTimeout(doSpeak, 500);
            }
        }
